<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小猫咪 - 萌宠日常</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Pet Tech App 配色 - 来自 UI/UX Pro Max design system */
      --primary: #F97316;
      --primary-on: #0F172A;
      --secondary: #FB923C;
      --accent: #2563EB;
      --accent-on: #FFFFFF;
      --background: #FFF7ED;
      --foreground: #9A3412;
      --card: #FFFFFF;
      --card-foreground: #9A3412;
      --muted: #F1F0F0;
      --muted-foreground: #64748B;
      --border: #FED7AA;
      --destructive: #DC2626;
      --ring: #F97316;
      --radius-outer: 28px;
      --radius-card: 20px;
      --radius-btn: 16px;
      --shadow-clay: 0 4px 0 0 rgba(154, 52, 18, 0.12), 0 8px 24px -4px rgba(249, 115, 22, 0.15);
      --shadow-card: 0 2px 0 0 rgba(154, 52, 18, 0.06), 0 12px 32px -8px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Nunito', -apple-system, sans-serif;
      background: var(--background);
      color: var(--foreground);
      min-height: 100vh;
      padding-bottom: 80px;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(255,247,237,0.98) 0%, var(--background) 100%);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo {
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--foreground);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-clay);
    }
    .logo-icon svg {
      width: 22px;
      height: 22px;
      fill: white;
    }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-btn);
      border: none;
      background: var(--card);
      color: var(--foreground);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-card);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .icon-btn:hover { transform: scale(0.96); }
    .icon-btn:focus-visible { outline: 2px solid var(--ring); outline-offset: 2px; }
    .icon-btn svg { width: 22px; height: 22px; }

    /* Hero - 主猫卡片 */
    .hero {
      padding: 20px;
      margin-bottom: 8px;
    }
    .hero-card {
      background: var(--card);
      border-radius: var(--radius-outer);
      padding: 24px;
      box-shadow: var(--shadow-card);
      border: 2px solid var(--border);
      text-align: center;
    }
    .cat-avatar {
      width: 120px;
      height: 120px;
      margin: 0 auto 16px;
      background: linear-gradient(145deg, #FED7AA 0%, #FDBA74 50%, #FB923C 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 0 0 rgba(154, 52, 18, 0.15), 0 12px 32px -4px rgba(249, 115, 22, 0.25);
    }
    .cat-avatar svg {
      width: 70px;
      height: 70px;
      fill: var(--foreground);
      opacity: 0.9;
    }
    .hero-card h1 {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.5rem;
      color: var(--foreground);
      margin-bottom: 4px;
    }
    .hero-card .subtitle {
      font-size: 0.9rem;
      color: var(--muted-foreground);
      margin-bottom: 20px;
    }
    .stats-row {
      display: flex;
      justify-content: center;
      gap: 24px;
    }
    .stat {
      text-align: center;
    }
    .stat-value {
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      font-size: 1.25rem;
      color: var(--primary);
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--muted-foreground);
    }

    /* 快捷操作区 */
    .section-title {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.1rem;
      padding: 0 20px 12px;
      color: var(--foreground);
    }
    .quick-actions {
      padding: 0 20px 24px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .action-card {
      background: var(--card);
      border-radius: var(--radius-card);
      padding: 20px 12px;
      text-align: center;
      box-shadow: var(--shadow-card);
      border: 2px solid var(--border);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .action-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 0 0 rgba(154, 52, 18, 0.08), 0 16px 40px -8px rgba(0,0,0,0.12);
    }
    .action-card:focus-visible { outline: 2px solid var(--ring); outline-offset: 2px; }
    .action-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 10px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .action-card:nth-child(1) .action-icon { background: linear-gradient(135deg, #FED7AA, #FDBA74); }
    .action-card:nth-child(2) .action-icon { background: linear-gradient(135deg, #BFDBFE, #93C5FD); }
    .action-card:nth-child(3) .action-icon { background: linear-gradient(135deg, #BBF7D0, #86EFAC); }
    .action-icon svg { width: 26px; height: 26px; fill: var(--foreground); }
    .action-card span {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--foreground);
    }

    /* 今日动态 */
    .feed-section {
      padding: 0 20px 24px;
    }
    .feed-card {
      background: var(--card);
      border-radius: var(--radius-card);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-card);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .feed-time {
      font-size: 0.75rem;
      color: var(--muted-foreground);
      min-width: 48px;
    }
    .feed-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--primary);
      flex-shrink: 0;
    }
    .feed-content {
      flex: 1;
    }
    .feed-content strong {
      font-size: 0.95rem;
      color: var(--foreground);
    }
    .feed-content p {
      font-size: 0.85rem;
      color: var(--muted-foreground);
      margin-top: 2px;
    }

    /* 底部导航 */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 72px;
      background: var(--card);
      border-top: 2px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 0 24px;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.06);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--muted-foreground);
      text-decoration: none;
      font-size: 0.75rem;
      padding: 8px 16px;
      border-radius: var(--radius-btn);
      transition: color 0.2s, background 0.2s;
    }
    .nav-item:hover, .nav-item.active {
      color: var(--primary);
    }
    .nav-item.active {
      background: rgba(249, 115, 22, 0.12);
    }
    .nav-item svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    /* 响应式 */
    @media (min-width: 768px) {
      body { max-width: 420px; margin: 0 auto; }
      .bottom-nav { max-width: 420px; left: 50%; transform: translateX(-50%); }
    }
  </style>
</head>
